<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            width: 440px;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgb(184, 184, 184);
        }

        h1 {
            text-align: center;
            color: #2b3a4a;
            margin-bottom: 18px;
        }

        .group {
            margin-bottom: 12px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        input,
        select {
            font-size: 13px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
        }

        input:focus,
        select:focus {
            border-color: #3b6db3;
            outline: none;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
        }

        button {
            width: 48%;
            padding: 9px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }

        .primary {
            background: #3b6db3;
            color: #fff;
        }

        .secondary {
            background: #e6e6e6;
        }

        .terms {
            margin-top: 14px;
            text-align: center;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="card">
        <form action="display.html" method="get">

            <h1>Registration</h1>

            <div class="group">
                <label>Full Name</label>
                <input type="text">
            </div>

            <div class="group">
                <label>Gender</label>
                <div class="row">
                    <label><input type="radio" name="gender"> Female</label>
                    <label><input type="radio" name="gender"> Male</label>
                </div>
            </div>

            <div class="group">
                <label>Class</label>
                <input type="text">
            </div>

            <div class="group">
                <label>Skills</label>
                <div class="row">
                    <label><input type="checkbox"> C</label>
                    <label><input type="checkbox"> C++</label>
                    <label><input type="checkbox"> JAVA</label>
                    <label><input type="checkbox"> PHP</label>
                    <label><input type="checkbox"> AJAX</label>
                    <label><input type="checkbox"> JS</label>
                    <label><input type="checkbox"> Typescript</label>
                </div>
            </div>

            <div class="group">
                <label>Department</label>
                <select>
                    <option>COMPUTER</option>
                    <option>Information Technology</option>
                    <option>Electronics & Telecommunication</option>
                    <option>Mechanical</option>
                    <option>Civil</option>
                </select>
            </div>

            <div class="group">
                <label>Email</label>
                <input type="email">
            </div>

            <div class="group">
                <label>Phone</label>
                <input type="text">
            </div>

            <div class="actions">
                <button class="primary">SUBMIT</button>
                <button type="reset" class="secondary">CANCEL</button>
            </div>

            <div class="terms">
                By clicking Submit you agree to our Terms & Conditions
            </div>

        </form>
    </div>

</body>

</html>
